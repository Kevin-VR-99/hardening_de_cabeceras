<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Pantalla estilo Instagram con CSP</title>
  <!-- Política CSP -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; 
               img-src 'self' https://upload.wikimedia.org; 
               script-src 'self' 'unsafe-inline'; 
               style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; 
               font-src 'self' https://cdnjs.cloudflare.com;">


  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
      display: flex;
      color: #333;
    }

    /* Barra lateral izquierda */
    nav {
      width: 80px;
      background: #9b59b6;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 0;
      transition: width 0.3s ease;
    }

    nav:hover {
      width: 220px;
    }

    nav ul {
      list-style: none;
      padding: 0;
      width: 100%;
    }

    nav ul li {
      margin: 1rem 0;
      display: flex;
      align-items: center;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    nav ul li:hover {
      background: #6c3483;
    }

    nav ul li i {
      font-size: 1.5rem;
      margin-right: 1rem;
    }

    nav ul li span {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    nav:hover ul li span {
      opacity: 1;
    }

    /* Layout principal */
    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .feed {
      max-width: 600px;
      flex: 2;
    }

    .sidebar {
      flex: 1;
      max-width: 300px;
    }

    /* Historias */
    .stories {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      overflow-x: auto;
    }

    .story {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #ddd;
      border: 3px solid #9b59b6;
      flex-shrink: 0;
    }

    /* Post */
    .post {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }

    .post-header {
      display: flex;
      align-items: center;
      padding: 1rem;
      border-bottom: 1px solid #eee;
    }

    .post-header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 1rem;
    }

    .post img.main-img {
      width: 100%;
      display: block;
    }

    .post-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1rem;
    }

    .left-icons {
      display: flex;
      gap: 1rem;
    }

    .post-actions i {
      font-size: 1.4rem;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .post-actions i:hover {
      color: #9b59b6;
    }

    .post-content {
      padding: 1rem;
    }

    /* Sugerencias */
    .suggestions {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      padding: 1rem;
    }

    .suggestions h3 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      color: #9b59b6;
    }

    .suggestion {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .suggestion img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 1rem;
    }

    .suggestion span {
      flex: 1;
    }

    .suggestion button {
      background: #9b59b6;
      color: #fff;
      border: none;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
    }

    .suggestion button:hover {
      background: #6c3483;
    }

    /* Estilos del botón regresar */
    .back-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #9b59b6;
      color: #fff;
      border: none;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      transition: background 0.3s ease;
    }

    .back-button:hover {
      background: #6c3483;
    }
  </style>
  <!-- Íconos de FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <!-- Barra lateral -->
  <nav>
    <ul>
      <li><i class="fas fa-home"></i><span>Inicio</span></li>
      <li><i class="fas fa-search"></i><span>Buscar</span></li>
      <li><i class="fas fa-compass"></i><span>Explorar</span></li>
      <li><i class="fas fa-video"></i><span>Reels</span></li>
      <li><i class="fas fa-envelope"></i><span>Mensajes</span></li>
      <li><i class="fas fa-bell"></i><span>Notificaciones</span></li>
      <li><i class="fas fa-plus-square"></i><span>Crear</span></li>
      <li><i class="fas fa-user"></i><span>Perfil</span></li>
    </ul>
  </nav>

  <!-- Contenedor principal -->
  <div class="container">
    <!-- Feed central -->
    <div class="feed">
      <!-- Historias -->
      <div class="stories">
        <div class="story"></div>
        <div class="story"></div>
        <div class="story"></div>
        <div class="story"></div>
        <div class="story"></div>
      </div>

      <!-- Post local permitido -->
      <div class="post">
        <div class="post-header">
          <img src="img/foto1.png" alt="Usuario">
          <strong>usuario_demo</strong>
        </div>
        <img src="img/foto1.png" alt="Foto local" class="main-img">

        <div class="post-actions">
          <div class="left-icons">
            <i class="fas fa-heart"></i>
            <i class="fas fa-comment"></i>
            <i class="fas fa-paper-plane"></i>
          </div>
          <i class="fas fa-bookmark"></i>
        </div>

        <div class="post-content">
          <p>RACCOONS WAFFLES</p>
        </div>
      </div>

      <!-- Post externo bloqueado por CSP -->
      <div class="post">
        <div class="post-header">
          <img src="img/foto2.jpg" alt="Usuario">
          <strong>usuario_externo</strong>
        </div>
        <!-- Imagen desde un dominio externo (bloqueada por CSP) -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg" alt="Imagen bloqueada"
          class="main-img">

        <div class="post-actions">
          <div class="left-icons">
            <i class="fas fa-heart"></i>
            <i class="fas fa-comment"></i>
            <i class="fas fa-paper-plane"></i>
          </div>
          <i class="fas fa-bookmark"></i>
        </div>

        <div class="post-content">
          <p>Paisaje.</p>
        </div>
      </div>
    </div>

    <!-- Columna de sugerencias -->
    <div class="sidebar">
      <div class="suggestions">
        <h3>Sugerencias para ti</h3>
        <div class="suggestion">
          <img src="img/foto1.png" alt="Usuario">
          <span>valadah_alcudia</span>
          <button>Seguir</button>
        </div>
        <div class="suggestion">
          <img src="img/foto1.png" alt="Usuario">
          <span>Julia Méndez</span>
          <button>Seguir</button>
        </div>
        <div class="suggestion">
          <img src="img/foto1.png" alt="Usuario">
          <span>Yaniv</span>
          <button>Seguir</button>
        </div>
        <div class="suggestion">
          <img src="img/foto1.png" alt="Usuario">
          <span>Esthefany✨</span>
          <button>Seguir</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Botón regresar -->
  <button class="back-button" onclick="window.location.href='../index.html'">
    ⬅ Regresar
  </button>
  </button>
</body>

</html>
