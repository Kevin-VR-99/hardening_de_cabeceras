<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Red Social - Iniciar Sesión</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2a5298, #1e3c72);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }
    .login-box h1 {
      margin-bottom: 1.5rem;
      color: #2a5298;
      font-size: 1.8rem;
    }
    .login-box input {
      width: 100%;
      padding: 0.8rem;
      margin: 0.6rem 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    .login-box button {
      width: 100%;
      padding: 0.9rem;
      background: #2a5298;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-top: 1rem;
    }
    .login-box button:hover {
      background: #1e3c72;
    }
    .login-box p {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #555;
    }
    .login-box a {
      color: #2a5298;
      text-decoration: none;
      font-weight: bold;
    }
    .login-box a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Iniciar Sesión</h1>
    <form>
      <input type="text" placeholder="Correo electrónico o usuario" required>
      <input type="password" placeholder="Contraseña" required>
      <button type="submit" onclick="alert('Inicio de sesión legítimo')">Entrar</button>
    </form>
    <p>¿Olvidaste tu contraseña? <a href="#">Recupérala aquí</a></p>
  </div>
</body>
</html>
