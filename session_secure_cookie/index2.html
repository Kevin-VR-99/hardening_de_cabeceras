<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo de Secure Session Cookie</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      background: #2c3e50;
      color: white;
      padding: 20px;
      margin: 0;
    }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      margin: 40px auto;
      padding: 20px;
      max-width: 500px;
    }

    .contador {
      font-size: 2rem;
      color: #27ae60;
      margin: 1rem 0;
    }

    a {
      display: inline-block;
      padding: 10px 20px;
      background: #2980b9;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s ease;
    }

    a:hover {
      background: #1f6391;
    }
  </style>
</head>
<body>
  <h1>Ejemplo de Secure Session Cookie</h1>
  <div class="card">
    <p>Esta demo usa cookies de sesión con atributos de seguridad:</p>
    <ul style="text-align:left; max-width:400px; margin:auto;">
      <li><strong>secure:</strong> solo por HTTPS</li>
      <li><strong>httpOnly:</strong> no accesible por JavaScript</li>
      <li><strong>sameSite:</strong> strict</li>
    </ul>
    <div class="contador" id="contador">Visitas: ...</div>
    <p>También puedes visitar <a href="/session-info">Ver datos de sesión</a></p>
  </div>

  <script>
    async function cargarVisitas() {
      const res = await fetch("/session-info");
      const data = await res.json();
      document.getElementById("contador").textContent = "Visitas: " + data.visitas;
    }
    cargarVisitas();
  </script>
</body>
</html>
