<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Demo Session Cookie</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      background: #4CAF50;
      color: white;
      padding: 20px;
      margin: 0;
    }

    p {
      font-size: 18px;
      margin: 20px;
    }

    a {
      display: inline-block;
      padding: 10px 20px;
      background: #FF5722;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s ease;
    }

    a:hover {
      background: #E64A19;
    }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      margin: 40px auto;
      padding: 20px;
      max-width: 500px;
    }

    .contador {
      font-size: 2rem;
      color: #27ae60;
      margin: 1rem 0;
    }

    button {
      background: #e67e22;
      color: #fff;
      border: none;
      padding: 0.7rem 1.2rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #d35400;
    }
  </style>
</head>
<body>
  <h1>Ejemplo de Session Cookie</h1>
  <div class="card">
    <p>Refresca esta página varias veces para aumentar el contador de visitas.</p>
    <div class="contador" id="contador">Visitas: ...</div>
    <p>También puedes visitar <a href="/session-info">Ver datos de sesión</a></p>
    <button onclick="verSesion()">Ver datos de sesión en ventana</button>
  </div>

  <script>
    async function cargarVisitas() {
      const res = await fetch("/session-info");
      const data = await res.json();
      document.getElementById("contador").textContent = "Visitas: " + data.visitas;
    }

    async function verSesion() {
      const res = await fetch("/session-info");
      const data = await res.json();
      alert("Visitas: " + data.visitas + "\nMensaje: " + data.mensaje);
    }

    // Cargar visitas al abrir la página
    cargarVisitas();
  </script>
</body>
</html>
